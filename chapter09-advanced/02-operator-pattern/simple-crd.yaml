# 简化的 CRD：定义 "Backup" 自定义资源
# 一个真实的 Backup Operator 会用这个 CRD 来管理数据库备份任务
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: backups.example.com
  labels:
    chapter: "09"
spec:
  group: example.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                # 备份目标数据库的连接信息
                # 在生产环境中，敏感信息应该使用 Secret 引用，而非明文
                targetDatabase:
                  type: string
                  description: "要备份的数据库服务名称"
                # Cron 表达式，控制备份执行频率
                # 格式：分 时 日 月 周
                schedule:
                  type: string
                  # 校验 Cron 表达式的基本格式
                  pattern: "^[\\d*/-]+ [\\d*/-]+ [\\d*/-]+ [\\d*/-]+ [\\d*/-]+$"
                # 备份保留天数，超过后自动清理
                retentionDays:
                  type: integer
                  minimum: 1
                  maximum: 365
                  default: 7
                # 备份存储目标
                storage:
                  type: object
                  properties:
                    # 存储类型：s3、gcs、local
                    type:
                      type: string
                      enum:
                        - s3
                        - gcs
                        - local
                    # 存储桶/路径
                    path:
                      type: string
                  required:
                    - type
                    - path
              required:
                - targetDatabase
                - schedule
                - storage
            # status 描述资源的实际状态，由 Controller 填写
            # 用户不应直接修改 status 字段
            status:
              type: object
              properties:
                # 上次备份的执行时间
                lastBackupTime:
                  type: string
                  format: date-time
                # 上次备份的状态：Success / Failed / InProgress
                lastBackupStatus:
                  type: string
                  enum:
                    - Success
                    - Failed
                    - InProgress
                # 已完成的备份次数
                backupCount:
                  type: integer
      # status subresource 让 Controller 可以独立更新 status
      # 不影响 spec 的 resourceVersion，减少冲突
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Schedule
          type: string
          jsonPath: .spec.schedule
        - name: Target
          type: string
          jsonPath: .spec.targetDatabase
        - name: Last Status
          type: string
          jsonPath: .status.lastBackupStatus
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: backups
    singular: backup
    shortNames:
      - bk
    kind: Backup
