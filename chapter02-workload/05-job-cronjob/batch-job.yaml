# batch-job.yaml
# 批量 Job：completions + parallelism
# 演示固定完成数模式 — 总共需要 5 个 Pod 成功，每次最多 2 个并行

apiVersion: batch/v1
kind: Job
metadata:
  name: batch-demo
  labels:
    chapter: "02"
spec:
  # 总共需要成功完成的 Pod 数量
  # Job 控制器会持续创建 Pod，直到成功数量达到这个值
  completions: 5

  # 同时运行的 Pod 数量上限
  # 2 个 Pod 并行运行，完成一个后再创建下一个
  parallelism: 2

  # 最大重试次数
  backoffLimit: 6

  # 最长运行 5 分钟
  activeDeadlineSeconds: 300

  ttlSecondsAfterFinished: 600

  template:
    metadata:
      labels:
        app: batch-demo
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          # 每个 Pod 模拟一个工作单元
          # 随机 sleep 5-15 秒模拟处理时间，有 10% 概率"失败"
          # 这让我们能观察到 Job 的重试机制
          command:
            - /bin/sh
            - -c
            - |
              echo "[$(date)] Worker starting (POD: $HOSTNAME)..."
              # 随机决定是否失败（10% 概率），模拟真实场景中的偶发错误
              if [ $((RANDOM % 10)) -eq 0 ]; then
                echo "[$(date)] Simulating failure!"
                exit 1
              fi
              # 随机 sleep 5-15 秒模拟工作
              SLEEP_TIME=$((5 + RANDOM % 11))
              echo "[$(date)] Working for ${SLEEP_TIME} seconds..."
              sleep $SLEEP_TIME
              echo "[$(date)] Worker completed successfully!"
          resources:
            requests:
              cpu: 30m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
