# hello-cronjob.yaml
# CronJob 示例：每分钟运行一次
# 演示定时任务的核心功能：cron 调度、并发策略、历史限制

apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-cronjob
  labels:
    chapter: "02"
spec:
  # Cron 表达式：每分钟执行一次
  # 格式：分 时 日 月 星期
  # */1 表示"每 1 分钟"
  schedule: "*/1 * * * *"

  # 并发策略：
  # Allow   — 允许同时运行多个 Job（默认）
  # Forbid  — 如果上一次还没完成，跳过本次调度
  # Replace — 如果上一次还没完成，终止旧的创建新的
  concurrencyPolicy: Forbid

  # 启动截止时间（秒）
  # 如果因为某种原因（控制器崩溃）错过了调度时间，
  # 在这个时间窗口内仍然可以启动
  startingDeadlineSeconds: 200

  # 保留的成功 Job 历史数量
  # 超过这个数量的旧 Job 会被自动清理
  successfulJobsHistoryLimit: 3

  # 保留的失败 Job 历史数量
  failedJobsHistoryLimit: 1

  # 暂停标志：设为 true 则不再创建新 Job
  suspend: false

  # Job 模板：每次触发时生成的 Job 规格
  jobTemplate:
    metadata:
      labels:
        app: hello-cronjob
    spec:
      # 每个 Job 只需要 1 个 Pod 成功
      completions: 1
      parallelism: 1
      backoffLimit: 2
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: hello
              image: busybox:1.36
              # 简单任务：打印当前时间和问候语
              # 在实际场景中，这里可能是数据备份、日志轮转、报表生成等
              command:
                - /bin/sh
                - -c
                - |
                  echo "========================================"
                  echo "CronJob executed at: $(date)"
                  echo "Hello from CronJob!"
                  echo "Hostname: $HOSTNAME"
                  echo "========================================"
              resources:
                requests:
                  cpu: 20m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
