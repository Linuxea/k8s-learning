# nginx-statefulset.yaml
# StatefulSet 示例：3 副本 nginx + Headless Service + volumeClaimTemplates
# 演示有状态应用的核心特性：稳定网络标识、稳定持久存储、有序操作

---
# Headless Service
# ClusterIP: None 表示不分配虚拟 IP，DNS 查询直接返回 Pod IP
# StatefulSet 通过这个 Service 为每个 Pod 创建 DNS 记录：
#   <pod-name>.<service-name>.<namespace>.svc.cluster.local
# 例如：nginx-statefulset-0.nginx-headless.default.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
  labels:
    app: nginx-sts
    chapter: "02"
spec:
  # 关键字段：None 使其成为 Headless Service
  # 不做负载均衡，DNS 查询直接返回后端 Pod 的 IP
  clusterIP: None
  selector:
    app: nginx-sts
  ports:
    - name: http
      port: 80
      targetPort: 80

---
# StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nginx-statefulset
  labels:
    chapter: "02"
spec:
  # 必须指定 serviceName，关联上面的 Headless Service
  # StatefulSet 控制器会通过这个 Service 管理 Pod 的 DNS 记录
  serviceName: nginx-headless

  replicas: 3

  selector:
    matchLabels:
      app: nginx-sts

  # Pod 管理策略
  # OrderedReady：严格顺序创建/删除（0→1→2 创建，2→1→0 删除）
  # Parallel：同时创建/删除所有 Pod，不等待
  podManagementPolicy: OrderedReady

  template:
    metadata:
      labels:
        app: nginx-sts
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            # 挂载 volumeClaimTemplates 创建的 PVC
            # 每个 Pod 会挂载自己专属的 PVC
            - name: www
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

  # 持久卷声明模板
  # StatefulSet 会为每个 Pod 自动创建一个 PVC
  # PVC 命名格式：{模板名}-{StatefulSet名}-{序号}
  # 例如：www-nginx-statefulset-0, www-nginx-statefulset-1, ...
  # Pod 重建后会自动重新挂载同一个 PVC，数据不丢失
  volumeClaimTemplates:
    - metadata:
        name: www
      spec:
        accessModes:
          - ReadWriteOnce  # 只允许一个节点读写
        resources:
          requests:
            storage: 1Gi
