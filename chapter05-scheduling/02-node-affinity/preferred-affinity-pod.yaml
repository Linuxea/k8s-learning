apiVersion: v1
kind: Pod
metadata:
  name: nginx-preferred-affinity
  labels:
    app: nginx
    env: demo
spec:
  affinity:
    nodeAffinity:
      # preferredDuringSchedulingIgnoredDuringExecution: 软性偏好
      # 调度器会尽量满足条件，但如果无法满足，仍然会调度到其他节点
      # weight: 1-100 的权重值，多个偏好时权重越高优先级越高
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              # 优先调度到有 ssd 磁盘的节点
              - key: disk
                operator: In
                values:
                  - ssd
        - weight: 50
          preference:
            matchExpressions:
              # 其次偏好调度到 zone-a 区域
              - key: zone
                operator: In
                values:
                  - zone-a
  containers:
    - name: nginx
      image: nginx:1.27
      ports:
        - containerPort: 80
