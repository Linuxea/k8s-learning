apiVersion: v1
kind: Pod
metadata:
  name: nginx-with-toleration
  labels:
    app: nginx
    env: demo
spec:
  # tolerations: 允许 Pod 被调度到带有匹配污点的节点上
  # 如果没有 toleration，Pod 不会被调度到有 NoSchedule 污点的节点
  tolerations:
    # operator: Equal — 污点的 key、value、effect 必须完全匹配
    - key: "special-workload"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
    # operator: Exists — 只要污点有对应的 key 即可，不关心 value
    # 下面这条容忍允许 Pod 调度到 control-plane 节点
    # - key: "node-role.kubernetes.io/control-plane"
    #   operator: "Exists"
    #   effect: "NoSchedule"
  containers:
    - name: nginx
      image: nginx:1.27
      ports:
        - containerPort: 80
