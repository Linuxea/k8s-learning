apiVersion: v1
kind: Pod
metadata:
  name: nginx-on-ssd
  labels:
    app: nginx
    env: demo
spec:
  # nodeSelector: 最简单的节点选择方式，只支持精确匹配
  # Pod 只会被调度到拥有 disk=ssd 标签的节点上
  # 如果没有节点满足条件，Pod 会一直处于 Pending 状态
  nodeSelector:
    disk: ssd
  containers:
    - name: nginx
      image: nginx:1.27
      ports:
        - containerPort: 80
