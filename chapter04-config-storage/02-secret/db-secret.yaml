apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  # Secret 也是命名空间级别资源，和 ConfigMap 一样只在所在 namespace 内可见
type: Opaque
# type 字段说明 Secret 的用途类型，影响某些工具的显示和处理方式
# Opaque 是最通用的类型，可以存放任意键值对

data:
  # 注意：data 下的值必须是 base64 编码的
  # "admin" → base64 → "YWRtaW4="
  # "my-super-password" → base64 → "bXktc3VwZXItcGFzc3dvcmQ="
  username: YWRtaW4=
  password: bXktc3VwZXItcGFzc3dvcmQ=

# 也可以用 stringData 字段写明文，K8s 会自动帮你做 base64 编码
# stringData:
#   username: admin
#   password: my-super-password
#
# 注意：stringData 只在创建时生效。如果你 kubectl get -o yaml 导出，
# 看到的仍然是 data（base64 编码后的值）

---
# 另一种常见的 Secret 类型：TLS 证书
# 创建方式：kubectl create secret tls my-tls --cert=tls.crt --key=tls.key
# apiVersion: v1
# kind: Secret
# metadata:
#   name: my-tls-secret
# type: kubernetes.io/tls
# data:
#   tls.crt: <base64 encoded cert>
#   tls.key: <base64 encoded key>
