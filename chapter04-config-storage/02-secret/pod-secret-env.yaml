apiVersion: v1
kind: Pod
metadata:
  name: secret-env-demo
  labels:
    app: secret-demo
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      # 打印数据库连接相关环境变量后保持运行
      command: ["sh", "-c", "echo DB_USER=$DB_USERNAME DB_PASS=$DB_PASSWORD && sleep 3600"]
      env:
        # 从 Secret 中读取键值作为环境变量
        # 用法和 configMapKeyRef 几乎一样，只是换成 secretKeyRef
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-secret       # Secret 的名字
              key: username          # Secret 中的键

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password

  restartPolicy: Never
