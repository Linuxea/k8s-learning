apiVersion: v1
kind: Pod
metadata:
  name: secret-volume-demo
  labels:
    app: secret-demo
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sh", "-c", "cat /etc/db-credentials/username && echo '---' && cat /etc/db-credentials/password && sleep 3600"]
      volumeMounts:
        # 把 Secret 挂载为文件，每个键变成一个文件
        - name: secret-volume
          mountPath: /etc/db-credentials
          readOnly: true   # 强烈建议设为只读，防止应用意外修改凭证

  volumes:
    - name: secret-volume
      secret:
        secretName: db-secret
        # defaultMode: 0400   # 可选：设置文件权限。Secret 默认权限是 0644
        # 生产环境建议用更严格的权限，如 0400（仅所有者可读）

  restartPolicy: Never
