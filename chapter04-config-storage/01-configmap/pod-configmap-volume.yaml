apiVersion: v1
kind: Pod
metadata:
  name: configmap-volume-demo
  labels:
    app: config-demo
spec:
  containers:
    - name: nginx
      image: nginx:1.27
      volumeMounts:
        # 目录挂载（不用 subPath）：ConfigMap 的所有键变成目录下的文件
        # 更新时 kubelet 通过符号链接原子替换 → 文件内容会自动变
        # 但应用不一定感知：nginx 可能缓存了旧文件的 inode
        # 注意：subPath 挂载的文件永远不更新（K8s 已知限制）
        - name: config-volume
          mountPath: /etc/nginx/conf.d
          readOnly: true

  volumes:
    - name: config-volume
      configMap:
        name: app-config
        # items 过滤只挂载指定键，其余键不暴露
        items:
          - key: nginx.conf
            path: default.conf
            mode: 0644

  restartPolicy: Never
