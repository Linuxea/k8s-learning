apiVersion: v1
kind: Pod
metadata:
  name: app-with-pvc
  labels:
    app: pvc-demo
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      # 先写入数据，然后保持运行
      command: ["sh", "-c"]
      args:
        - |
          echo "Hello from PV demo!" > /data/index.html
          echo "Written at: $(date)" >> /data/index.html
          echo "Data written to PV. Keeping pod alive..."
          sleep 3600
      volumeMounts:
        - name: data-volume
          mountPath: /data   # 把 PVC 挂载到容器的 /data 目录

  volumes:
    - name: data-volume
      persistentVolumeClaim:
        claimName: app-pvc   # 引用 PVC 的名字

  restartPolicy: Never
