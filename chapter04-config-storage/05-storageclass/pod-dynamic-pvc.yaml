apiVersion: v1
kind: Pod
metadata:
  name: app-dynamic-pvc
  labels:
    app: dynamic-pvc-demo
spec:
  containers:
    - name: nginx
      image: nginx:1.27
      # nginx 默认服务 /usr/share/nginx/html 的内容
      # 把 PVC 挂载到这里，验证持久化
      volumeMounts:
        - name: web-data
          mountPath: /usr/share/nginx/html

  volumes:
    - name: web-data
      persistentVolumeClaim:
        claimName: dynamic-pvc   # 引用动态创建的 PVC

  restartPolicy: Never
