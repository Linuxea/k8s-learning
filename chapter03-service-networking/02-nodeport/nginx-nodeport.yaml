# ============================================================
# NodePort Service 示例：Deployment + Service
#
# 注意：kind 环境下 NodePort 绑定在 Docker 容器内部 IP (172.18.0.x)，
# 无法通过宿主机公网 IP 直接访问——容器和宿主机网络隔离。
# 真实集群（kubelet 直跑宿主机）NodePort 绑定宿主机网卡，可公网访问。
#
# 踩坑：ingress-nginx 默认占用 30080，此处改为 30081。
# ============================================================

---
# Deployment: 2 个 nginx Pod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-nodeport
  labels:
    app: nginx-nodeport
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-nodeport
  template:
    metadata:
      labels:
        # Service 通过这个标签找到 Pod
        app: nginx-nodeport
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80

---
# Service: NodePort 类型
# 在每个 Node 上开放一个端口，让集群外部可以通过 NodeIP:NodePort 访问
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport-svc
spec:
  type: NodePort
  selector:
    app: nginx-nodeport
  ports:
    - protocol: TCP
      # Service 内部端口（集群内访问用的端口）
      port: 80
      # Pod 容器端口
      targetPort: 80
      # NodePort: 在每个节点上开放的端口，范围 30000-32767
      # 如果省略，K8s 会自动分配；显式指定方便记忆和文档化
      # 端口冲突时 apply 直接报错 "already allocated"，不会静默覆盖
      nodePort: 30081
