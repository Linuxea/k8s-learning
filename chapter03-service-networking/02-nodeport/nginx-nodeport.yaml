# ============================================================
# NodePort Service 示例：Deployment + Service
# ============================================================

---
# Deployment: 2 个 nginx Pod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-nodeport
  labels:
    app: nginx-nodeport
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-nodeport
  template:
    metadata:
      labels:
        # Service 通过这个标签找到 Pod
        app: nginx-nodeport
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80

---
# Service: NodePort 类型
# 在每个 Node 上开放一个端口，让集群外部可以通过 NodeIP:NodePort 访问
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport-svc
spec:
  type: NodePort
  selector:
    app: nginx-nodeport
  ports:
    - protocol: TCP
      # Service 内部端口（集群内访问用的端口）
      port: 80
      # Pod 容器端口
      targetPort: 80
      # NodePort: 在每个节点上开放的端口，范围 30000-32767
      # 如果省略，K8s 会自动分配一个随机端口
      # 显式指定方便记忆和文档化
      nodePort: 30080
