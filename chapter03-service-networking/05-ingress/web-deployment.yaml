# ============================================================
# Ingress 示例：Web 应用 Deployment + ClusterIP Service
# ============================================================

---
# Deployment: 2 个 "web" Pod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:1.27
          ports:
            - containerPort: 80
          # 启动时写入 HTML 内容作为 "Web 页面"
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo '<h1>Hello from Web service</h1><p>This is the web frontend.</p>' > /usr/share/nginx/html/index.html
              nginx -g 'daemon off;'

---
# Service: ClusterIP 类型
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
