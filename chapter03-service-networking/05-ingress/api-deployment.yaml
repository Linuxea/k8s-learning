# ============================================================
# Ingress 示例：API 应用 Deployment + ClusterIP Service
# ============================================================

---
# Deployment: 2 个 "api" Pod
# 用 nginx 镜像模拟 API 服务，通过不同首页内容区分
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: nginx:1.27
          ports:
            - containerPort: 80
          # 启动时写入一段 JSON 内容作为 "API 响应"
          # 这样我们可以区分请求到了哪个服务
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo '{"service":"api","message":"Hello from API service"}' > /usr/share/nginx/html/index.html
              nginx -g 'daemon off;'

---
# Service: ClusterIP 类型，给 Ingress 用
# Ingress 只需要集群内可达的 Service，不需要 NodePort 或 LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
