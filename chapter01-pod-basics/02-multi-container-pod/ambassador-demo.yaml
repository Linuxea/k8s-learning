# Ambassador 模式演示：主容器通过 Ambassador 代理访问外部服务
#
# ⚠️ 免责声明：此 demo 仅验证"同 Pod 容器通过 localhost 通信"。
# Ambassador 用 busybox httpd 返回静态文本，没有做真正的代理转发。
# 真实场景中需替换为 nginx/Envoy/HAProxy 做反向代理。
# Ambassador 模式的核心价值（解耦外部服务、协议转换、TLS 封装）本 demo 无法展示。
#
# 结构：
# - main-app: 主应用，只知道 localhost:8888（不知道外部服务真实地址）
# - ambassador: 监听 8888，返回模拟响应（真实场景中应转发至真实后端）
apiVersion: v1
kind: Pod
metadata:
  name: ambassador-demo
  labels:
    chapter: "02"
    pattern: ambassador
spec:
  containers:
    # 主容器：模拟应用，通过 localhost:8888 访问"外部服务"
    - name: main-app
      image: busybox:1.36
      command: ["/bin/sh", "-c"]          # busybox 只用 /bin/sh，没有 /bin/bash
      args:
        - |
          echo "Main app started. Accessing service via localhost:8888"
          while true; do
            echo "[$(date)] Sending request to localhost:8888..."
            wget -qO- http://localhost:8888 2>/dev/null || echo "Request failed"
            sleep 10
          done

    # Ambassador 容器：监听 8888 端口
    # 真实场景应用 nginx/Envoy 替换 busybox httpd，做真正的代理转发
    - name: ambassador
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "Ambassador started. Listening on :8888"
          echo "Ambassador proxied response from real-backend:6379" > /tmp/index.html
          httpd -f -p 8888 -h /tmp
      ports:
        - containerPort: 8888
