# OOMKilled 演示：故意超过内存限制
# 这个 Pod 的内存限制是 50Mi，用 tail /dev/zero 持续吃掉内存
# 预期行为：容器被 OOMKilled，Exit Code 137
#
# ⚠️ 为什么不用 dd if=/dev/zero of=/tmp/bigfile？
# dd 写入文件使用的是 page cache（文件缓存），Linux 可以在内存紧张时回收它，
# 所以不算容器真实占用的进程内存，可能不会触发 OOM。
# tail /dev/zero 读取 /dev/zero 到进程内存中且不释放，保证 OOM 必触发。
apiVersion: v1
kind: Pod
metadata:
  name: oom-demo
  labels:
    chapter: "05"
spec:
  restartPolicy: Always  # OOM 后会自动重启，形成循环
  containers:
    - name: memory-hog
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "Starting memory allocation test..."
          echo "Memory limit: 50Mi"
          tail /dev/zero
      resources:
        requests:
          memory: "32Mi"
        limits:
          memory: "50Mi"    # 限制 50Mi，tail /dev/zero 会超过 → OOMKilled
