replicaCount: 2

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "1.27-alpine"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  # 默认关闭 Ingress，用户按需开启
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
