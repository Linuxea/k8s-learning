apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redis-master
  # 子 Chart 的资源命名通常包含 release name + 子 Chart 名
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: master
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: master
    spec:
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Redis 默认端口
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          # 健康检查：用 redis-cli ping 验证服务是否正常
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if not .Values.auth.enabled }}
          # 无认证模式：不需要密码
          args: ["--save", "60", "1", "--loglevel", "warning"]
          # --save 60 1：每 60 秒至少有 1 个 key 变化时自动保存
          # --loglevel warning：只记录警告及以上级别的日志
          {{- end }}
